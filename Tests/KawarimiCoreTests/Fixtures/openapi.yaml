openapi: "3.0.4"
info:
  title: "GreetingService"
  version: "1.0.0"
servers:
  - url: "https://localhost:8080/api"
    description: "Shared SPM test fixture (KawarimiCoreTests bundle + KawarimiTests CLI path)"
paths:
  /greet:
    get:
      tags: ["Greetings"]
      operationId: "getGreeting"
      parameters:
      - name: "name"
        required: false
        in: "query"
        description: "name"
        schema:
          type: "string"
      responses:
        "200":
          description: "Returns a greeting"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Greeting"
  /items:
    get:
      tags: ["Items"]
      operationId: "listItems"
      parameters:
      - name: "limit"
        required: false
        in: "query"
        schema:
          type: "integer"
          minimum: 1
          maximum: 100
          default: 20
      responses:
        "200":
          description: "List items"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
    post:
      tags: ["Items"]
      operationId: "createItem"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemCreate"
      responses:
        "201":
          description: "Created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "400":
          description: "Validation error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /items/{id}:
    get:
      tags: ["Items"]
      operationId: "getItem"
      parameters:
      - name: "id"
        required: true
        in: "path"
        schema:
          type: "string"
      responses:
        "200":
          description: "Found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: ["Items"]
      operationId: "deleteItem"
      parameters:
      - name: "id"
        required: true
        in: "path"
        schema:
          type: "string"
      responses:
        "204":
          description: "Deleted"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /tags:
    get:
      tags: ["Tags"]
      operationId: "listTags"
      responses:
        "200":
          description: "List tags"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
components:
  schemas:
    Greeting:
      type: "object"
      properties:
        message:
          type: string
      required:
        - message
    Item:
      type: "object"
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name
    ItemCreate:
      type: "object"
      properties:
        name:
          type: string
      required:
        - name
    Error:
      type: "object"
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message
    Tag:
      type: "object"
      properties:
        id:
          type: string
        label:
          type: string
      required:
        - id
        - label
