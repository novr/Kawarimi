openapi: 3.0.3
info:
  title: DateTimeEdgeArray
  version: "1"
paths:
  /times:
    get:
      operationId: getDateTimeArray
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  format: date-time
                  example: "2024-01-01T00:00:00Z"
