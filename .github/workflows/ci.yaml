name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Swift Test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Run tests
        run: swift test
