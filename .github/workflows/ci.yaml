name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

env:
  KAWARIMI_LINUX_CI: "1"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'Sources/**'
              - 'Tests/**'
              - 'Package.swift'
              - 'Package.resolved'
              - 'Example/**'
              - 'Scripts/**'
              - '.github/**'

  kawarimi:
    name: Swift Test (Kawarimi)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    container:
      image: swift:6.2-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Trust workspace for SwiftPM
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run tests
        run: swift test --filter 'KawarimiCoreTests|KawarimiTests'

  demo-package:
    name: Swift Test (Example/DemoPackage)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    container:
      image: swift:6.2-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Trust workspace for SwiftPM
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run tests
        working-directory: Example/DemoPackage
        run: swift test --filter 'DemoAPITests|DemoServerE2ETests'

  kawarimi-perf:
    name: Kawarimi perf
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    container:
      image: swift:6.2-noble
    env:
      KAWARIMI_PERF: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Trust workspace for SwiftPM
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: kawarimi-perf-out
        shell: bash
        run: |
          set -euo pipefail
          FIXTURE="${RUNNER_TEMP}/kawarimi-perf-spec"
          OUT="${RUNNER_TEMP}/kawarimi-perf-out"
          mkdir -p "$FIXTURE" "$OUT"
          python3 Scripts/performance/generate_openapi_fixture.py --preset small --format yaml "$FIXTURE" >/dev/null
          swift run --quiet Kawarimi "$FIXTURE/openapi.yaml" "$OUT" 2>&1 | tee "${RUNNER_TEMP}/kawarimi-run.log"
          grep '\[kawarimi-perf\]' "${RUNNER_TEMP}/kawarimi-run.log" | tee kawarimi-perf-lines.txt
          test -s kawarimi-perf-lines.txt

      - name: Compose PR comment body (markdown)
        shell: bash
        run: |
          set -euo pipefail
          sha_short="${GITHUB_SHA:0:7}"
          {
            echo '### Kawarimi `[kawarimi-perf]` — small fixture'
            echo ''
            echo "Commit \`${sha_short}\` · Kawarimi writes under basename \`kawarimi-perf-out\` (see workflow \`RUNNER_TEMP\`)."
            echo ''
            echo '```'
            cat kawarimi-perf-lines.txt
            echo '```'
          } > kawarimi-perf-comment.md

      - name: Comment PR
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: kawarimi-perf
          path: kawarimi-perf-comment.md

  swift-test:
    name: Swift Test
    runs-on: ubuntu-latest
    needs: [changes, kawarimi, demo-package, kawarimi-perf]
    if: always()
    steps:
      - name: Gate
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          CODE: ${{ needs.changes.outputs.code }}
          KAWARIMI: ${{ needs.kawarimi.result }}
          DEMO: ${{ needs.demo-package.result }}
          PERF: ${{ needs.kawarimi-perf.result }}
        run: |
          set -euo pipefail
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "changes job failed; refusing to green-light (CHANGES_RESULT=$CHANGES_RESULT)"
            exit 1
          fi
          if [ "$CODE" != "true" ]; then
            echo "No code-related paths in this PR; skipping Swift test jobs. Required check still passes."
            exit 0
          fi
          if [ "$KAWARIMI" != "success" ] || [ "$DEMO" != "success" ] || [ "$PERF" != "success" ]; then
            echo "Expected ubuntu test jobs to succeed; got KAWARIMI=$KAWARIMI DEMO=$DEMO PERF=$PERF"
            exit 1
          fi
          echo "OK"
