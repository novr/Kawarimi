name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  kawarimi:
    name: Swift Test (Kawarimi)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Swift
        uses: swift-actions/setup-swift@v2.4.0
        with:
          swift-version: "6.2"

      - name: Run tests
        run: swift test

  demo-package:
    name: Swift Test (Example/DemoPackage)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Swift
        uses: swift-actions/setup-swift@v2.4.0
        with:
          swift-version: "6.2"

      - name: Run tests
        working-directory: Example/DemoPackage
        run: swift test

  swift-test:
    name: Swift Test
    runs-on: ubuntu-latest
    needs: [kawarimi, demo-package]
    steps:
      - name: All checks passed
        run: echo "OK"
