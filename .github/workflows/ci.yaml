name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  KAWARIMI_LINUX_CI: "1"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'Sources/**'
              - 'Tests/**'
              - 'Package.swift'
              - 'Package.resolved'
              - 'Example/**'
              - 'Scripts/**'
              - '.github/**'

  kawarimi:
    name: Swift Test (Kawarimi)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    container:
      image: swift:6.2-noble
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Cache SwiftPM
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build
            /root/.cache/org.swift.swiftpm
          key: spm-linux-kawarimi-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-linux-kawarimi-
            spm-linux-

      - name: Trust workspace for SwiftPM
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run tests
        run: swift test

  demo-package:
    name: Swift Test (Example/DemoPackage)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    container:
      image: swift:6.2-noble
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Cache SwiftPM
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            Example/DemoPackage/.build
            /root/.cache/org.swift.swiftpm
          key: spm-linux-demo-${{ hashFiles('Example/DemoPackage/Package.resolved', 'Example/DemoPackage/Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-linux-demo-
            spm-linux-

      - name: Trust workspace for SwiftPM
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run tests
        working-directory: Example/DemoPackage
        run: swift test

  swift-test:
    name: Swift Test
    runs-on: ubuntu-latest
    needs: [changes, kawarimi, demo-package]
    if: always()
    steps:
      - name: Gate
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          CODE: ${{ needs.changes.outputs.code }}
          KAWARIMI: ${{ needs.kawarimi.result }}
          DEMO: ${{ needs.demo-package.result }}
        run: |
          set -euo pipefail
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "changes job failed; refusing to green-light (CHANGES_RESULT=$CHANGES_RESULT)"
            exit 1
          fi
          if [ "$CODE" != "true" ]; then
            echo "No code-related paths in this PR; skipping Swift test jobs. Required check still passes."
            exit 0
          fi
          if [ "$KAWARIMI" != "success" ] || [ "$DEMO" != "success" ]; then
            echo "Expected ubuntu test jobs to succeed; got KAWARIMI=$KAWARIMI DEMO=$DEMO"
            exit 1
          fi
          echo "OK"
