name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v3.3.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    container:
      image: swift:6.2-noble
    env:
      KAWARIMI_LINUX_CI: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ -z "${TAG}" ]]; then
            echo "Tag is required."
            exit 1
          fi
          VERSION="${TAG#v}"
          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
          } >> "${GITHUB_OUTPUT}"

      - name: Cache SwiftPM
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build
            /root/.cache/org.swift.swiftpm
          key: spm-linux-kawarimi-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-linux-kawarimi-
            spm-linux-

      - name: Trust workspace for SwiftPM
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Generate build info
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          for target in Kawarimi KawarimiValidate; do
            printf '%s\n' \
              '// Generated by release workflow — do not edit.' \
              'enum BuildInfo {' \
              "    static let version = \"$TAG\"" \
              '}' \
              > "Sources/${target}/Generated.swift"
          done

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          for target in Kawarimi KawarimiValidate; do
            VERSION="$(sed -n 's/.*static let version = "\(.*\)".*/\1/p' "Sources/${target}/Generated.swift")"
            if [[ "$VERSION" != "$TAG" ]]; then
              echo "Sources/${target}/Generated.swift version is '$VERSION', expected tag '$TAG'"
              exit 1
            fi
          done
          echo "BuildInfo.version=${TAG}"

      - name: Create source archive
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          ARCHIVE="/tmp/kawarimi-${TAG}-source.tar.gz"
          tar czf "$ARCHIVE" \
            --exclude='.git' \
            --exclude='.build' \
            -C "$GITHUB_WORKSPACE" \
            .
          cp "$ARCHIVE" "${GITHUB_WORKSPACE}/kawarimi-${TAG}-source.tar.gz"

      - name: Run tests
        run: swift test

      - name: Extract release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (in_section) exit
              if ($0 ~ "^## \\[" ver "\\] -") { in_section = 1; next }
            }
            in_section { print }
          ' CHANGELOG.md > RELEASE.md
          if [[ ! -s RELEASE.md ]]; then
            echo "CHANGELOG.md has no section ## [${VERSION}] - YYYY-MM-DD"
            exit 1
          fi

      - name: Upload verify artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-verify
          path: |
            kawarimi-${{ steps.meta.outputs.tag }}-source.tar.gz
            RELEASE.md
          if-no-files-found: warn

  build-macos:
    name: Build macOS binary
    runs-on: macos-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      asset: ${{ steps.meta.outputs.asset }}
      sha256: ${{ steps.package.outputs.sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ -z "${TAG}" ]]; then
            echo "Tag is required."
            exit 1
          fi
          VERSION="${TAG#v}"
          ASSET="kawarimi-validate_${VERSION}_darwin.tar.gz"
          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "asset=${ASSET}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Swift 6.2
        uses: swift-actions/setup-swift@364295d9c23900ce04d4e5cc708387921b4e50f9 # v3
        with:
          swift-version: "6.2"

      - name: Resolve Swift version hash
        id: swift-version
        shell: bash
        run: |
          echo "value=$(swift --version | shasum -a 256 | cut -d' ' -f1)" >> "${GITHUB_OUTPUT}"

      - name: Cache SwiftPM artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build/arm64
            .build/x86_64
            ~/.swiftpm
          key: ${{ runner.os }}-spm-kawarimi-validate-${{ steps.swift-version.outputs.value }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-kawarimi-validate-${{ steps.swift-version.outputs.value }}-
            ${{ runner.os }}-spm-kawarimi-validate-

      - name: Generate build info
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          for target in Kawarimi KawarimiValidate; do
            printf '%s\n' \
              '// Generated by release workflow — do not edit.' \
              'enum BuildInfo {' \
              "    static let version = \"$TAG\"" \
              '}' \
              > "Sources/${target}/Generated.swift"
          done

      - name: Build universal release binary
        shell: bash
        run: |
          set -euo pipefail
          swift build -c release --product KawarimiValidate --triple arm64-apple-macosx --build-path .build/arm64
          swift build -c release --product KawarimiValidate --triple x86_64-apple-macosx --build-path .build/x86_64
          mkdir -p dist
          lipo -create -output dist/kawarimi-validate \
            .build/arm64/release/KawarimiValidate .build/x86_64/release/KawarimiValidate
          lipo -info dist/kawarimi-validate | grep -q 'Architectures in the fat file:.*arm64'
          lipo -info dist/kawarimi-validate | grep -q 'Architectures in the fat file:.*x86_64'

      - name: Smoke test release binary
        shell: bash
        run: |
          set -euo pipefail
          ./dist/kawarimi-validate \
            --config Example/DemoPackage/kawarimi.json.example \
            --scenarios Example/DemoPackage/kawarimi-scenarios.json

      - name: Package release asset
        id: package
        shell: bash
        run: |
          set -euo pipefail
          ASSET="${{ steps.meta.outputs.asset }}"
          tar -C dist -czf "${ASSET}" kawarimi-validate
          SHA256="$(shasum -a 256 "${ASSET}" | cut -d' ' -f1)"
          echo "${SHA256}  ${ASSET}" > checksums.txt
          echo "sha256=${SHA256}" >> "${GITHUB_OUTPUT}"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-macos
          path: |
            ${{ steps.meta.outputs.asset }}
            checksums.txt

  publish:
    name: Publish release
    needs: [verify, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download verify artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-verify
          path: release-verify

      - name: Download macOS artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-macos
          path: release-macos

      - name: Upload release assets
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          body_path: release-verify/RELEASE.md
          files: |
            release-verify/kawarimi-${{ needs.build-macos.outputs.tag }}-source.tar.gz
            release-macos/${{ needs.build-macos.outputs.asset }}
            release-macos/checksums.txt
          fail_on_unmatched_files: true

  dispatch-formula:
    name: Dispatch formula update
    needs: [publish, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    uses: novr/homebrew-taps/.github/workflows/dispatch-formula.yml@main
    with:
      formula: kawarimi-validate
      version: ${{ needs.build-macos.outputs.version }}
      url: https://github.com/novr/Kawarimi/releases/download/${{ needs.build-macos.outputs.tag }}/${{ needs.build-macos.outputs.asset }}
      sha256: ${{ needs.build-macos.outputs.sha256 }}
      desc: "Fail on structural mock/scenario JSON issues that runtime only warns about."
      binary: kawarimi-validate
      test_match: kawarimi-validate
      source_repo: novr/Kawarimi
      license: MIT
    secrets:
      NOVRD_BOT_CLIENT_ID: ${{ secrets.NOVRD_BOT_CLIENT_ID }}
      NOVRD_BOT_KEY: ${{ secrets.NOVRD_BOT_KEY }}
