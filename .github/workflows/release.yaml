name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  KAWARIMI_LINUX_CI: "1"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    container:
      image: swift:6.2-noble
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Cache SwiftPM
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .build
            /root/.cache/org.swift.swiftpm
          key: spm-linux-kawarimi-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-linux-kawarimi-
            spm-linux-

      - name: Trust workspace for SwiftPM
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Generate build info
        run: |
          set -euo pipefail
          VERSION="$(git describe --tags --always)"
          printf '%s\n' \
            '// Generated by release workflow — do not edit.' \
            'enum BuildInfo {' \
            "    static let version = \"$VERSION\"" \
            '}' \
            > Sources/Kawarimi/Generated.swift

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="$(sed -n 's/.*static let version = "\(.*\)".*/\1/p' Sources/Kawarimi/Generated.swift)"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Generated.swift version is '$VERSION', expected tag '$TAG'"
            exit 1
          fi
          echo "BuildInfo.version=$VERSION"

      - name: Create source archive
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(sed -n 's/.*static let version = "\(.*\)".*/\1/p' Sources/Kawarimi/Generated.swift)"
          fi
          ARCHIVE="/tmp/kawarimi-${VERSION}-source.tar.gz"
          tar czf "$ARCHIVE" \
            --exclude='.git' \
            --exclude='.build' \
            -C "$GITHUB_WORKSPACE" \
            .
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Run tests
        run: swift test

      - name: Extract release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (in_section) exit
              if ($0 ~ "^## \\[" ver "\\] -") { in_section = 1; next }
            }
            in_section { print }
          ' CHANGELOG.md > RELEASE.md
          if [ ! -s RELEASE.md ]; then
            echo "CHANGELOG.md has no section ## [${VERSION}] - YYYY-MM-DD"
            exit 1
          fi

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body_path: RELEASE.md
          files: ${{ env.ARCHIVE }}
          fail_on_unmatched_files: true
