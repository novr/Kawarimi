version: 2

updates:
  - package-ecosystem: swift
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - swift
      - dependencies:package
    # swift-openapi-generator（Example/DemoPackage）が OpenAPIKit 3.9…<4 のみ許容するため、メジャー上げは同一グラフで解決不能
    ignore:
      - dependency-name: "openapikit"
        update-types: ["version-update:semver-major"]
    groups:
      patch:
        patterns:
          - "*"
        update-types:
          - patch

  - package-ecosystem: swift
    directory: /Example/DemoPackage
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - swift
      - dependencies:demo
    groups:
      patch:
        patterns:
          - "*"
        update-types:
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github_actions
    groups:
      actions:
        patterns:
          - "*"
